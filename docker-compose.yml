version: '3.8'

services:
  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./smart-eval-backend
    expose:
      - "5000"
    volumes:
      - backend_uploads:/app/uploads
    env_file:
      - ./smart-eval-backend/.env
    environment:
      - FLASK_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/smarteval
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build: ./smart-eval-backend
    command: celery -A tasks.celery_app.celery worker --loglevel=info
    volumes:
      - backend_uploads:/app/uploads
    env_file:
      - ./smart-eval-backend/.env
    environment:
      - FLASK_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/smarteval
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./smart-eval-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  backend_uploads:
